function getValidWords(letters,centerLetter){
  const ls=new Set(letters.map(l=>l.toLowerCase()));
  const c=centerLetter.toLowerCase();
  const valid=[];
  for(const w of WORDS){
    if(w.length<4)continue;
    if(!w.includes(c))continue;
    let ok=true;
    for(const ch of w){if(!ls.has(ch)){ok=false;break;}}
    if(ok)valid.push(w);
  }
  return valid;
}

function isPangram(word,letters){
  const ls=new Set(letters.map(l=>l.toLowerCase()));
  const ws=new Set(word.toLowerCase());
  for(const l of ls){if(!ws.has(l))return false;}
  return true;
}

function generatePuzzle(){
  const pangramSets=new Map();
  for(const w of WORDS){
    const unique=new Set(w);
    if(unique.size===7){
      const key=[...unique].sort().join("");
      if(!pangramSets.has(key))pangramSets.set(key,[]);
      pangramSets.get(key).push(w);
    }
  }
  const keys=[...pangramSets.keys()].sort(()=>Math.random()-0.5);
  let best=null,bestScore=0;
  for(let i=0;i<Math.min(keys.length,80);i++){
    const letters=keys[i].split("");
    for(const center of letters){
      const words=getValidWords(letters,center);
      if(words.length<20)continue;
      const pgs=words.filter(w=>isPangram(w,letters));
      const score=words.length+pgs.length*30;
      if(score>bestScore){best={letters,center,words,pangrams:pgs};bestScore=score;}
    }
    if(bestScore>=120)break;
  }
  if(!best){
    const fb=["e","r","v","a","t","d","s"];
    best={letters:fb,center:"e",words:getValidWords(fb,"e"),pangrams:[]};
    best.pangrams=best.words.filter(w=>isPangram(w,fb));
  }
  const others=best.letters.filter(l=>l!==best.center).sort(()=>Math.random()-0.5);
  return{center:best.center.toUpperCase(),outer:others.map(l=>l.toUpperCase()),validWords:best.words,pangrams:best.pangrams};
}

const RANKS=[
  {name:"Beginner",pct:0},{name:"Good Start",pct:0.02},{name:"Moving Up",pct:0.05},
  {name:"Good",pct:0.08},{name:"Solid",pct:0.15},{name:"Nice",pct:0.25},
  {name:"Great",pct:0.40},{name:"Amazing",pct:0.50},{name:"Genius",pct:0.70},{name:"Queen Bee",pct:1.0}
];

function getRank(score,maxScore){
  if(maxScore===0)return RANKS[0];
  const pct=score/maxScore;
  let rank=RANKS[0];
  for(const r of RANKS){if(pct>=r.pct)rank=r;}
  return rank;
}

function getMaxScore(validWords,letters){
  let t=0;
  for(const w of validWords){t+=w.length===4?1:w.length;if(isPangram(w,letters))t+=7;}
  return t;
}

function Hex({letter,isCenter,onClick,R,dark}){
  const W=Math.sqrt(3)*R,H=2*R;
  const bw=2.5; // border width
  const mkPts=(r,cx,cy)=>Array.from({length:6},(_,i)=>{
    const a=(Math.PI/180)*(60*i-30);
    return`${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`;
  }).join(" ");
  const outerPts=mkPts(R,W/2,H/2);
  const innerPts=mkPts(R-bw,W/2,H/2);
  const fill=isCenter?(dark?"#D4A017":"#F7C948"):(dark?"#3A3632":"#E8E4DC");
  const stroke=isCenter?(dark?"#B8880F":"#D4A017"):(dark?"#4A4640":"#C8C2B8");
  const textFill=isCenter?"#1A1200":(dark?"#E8E4DC":"#2D2A24");
  return e("button",{className:"hex-btn",onClick:()=>onClick(letter),style:{width:W,height:H},"aria-label":letter},
    e("svg",{width:W,height:H,viewBox:`0 0 ${W} ${H}`},
      e("polygon",{points:outerPts,fill:stroke,style:{transition:"fill 0.3s"}}),
      e("polygon",{points:innerPts,fill,style:{transition:"fill 0.3s"}}),
      e("text",{x:W/2,y:H/2,textAnchor:"middle",dominantBaseline:"central",fontSize:R*0.7,fontWeight:"800",fontFamily:"'DM Sans',sans-serif",fill:textFill,style:{userSelect:"none",pointerEvents:"none",transition:"fill 0.3s"}},letter)
    )
  );
}

function Honeycomb({center,outer,onLetterClick,dark}){
  const R=44,W=Math.sqrt(3)*R,H=2*R,GAP=5;
  const rows=[[outer[0],outer[1]],[outer[2],center,outer[3]],[outer[4],outer[5]]];
  const rowVGap=R*1.5+GAP,totalH=H+rowVGap*2,totalW=3*(W+GAP)-GAP;
  return e("div",{style:{position:"relative",width:totalW,height:totalH,margin:"8px auto"}},
    rows.map((row,ri)=>{
      const rowW=row.length*(W+GAP)-GAP;
      const left=(totalW-rowW)/2;
      const top=ri*rowVGap;
      return row.map((letter,ci)=>
        e("div",{key:`${ri}-${ci}`,style:{position:"absolute",left:left+ci*(W+GAP),top}},
          e(Hex,{letter,isCenter:ri===1&&ci===1,onClick:onLetterClick,R,dark})
        )
      );
    })
  );
}

      setPrevGame({puzzle:puzzleRef.current,found:foundRef.current,score:scoreRef.current});

      setPrevGame(null);
    }
    setPuzzle(generatePuzzle());

    if(!prevGame)return;

      ),
      showWords&&found.length>0&&e("div",{style:{display:"flex",flexWrap:"wrap"}},
        found.map(w=>e("span",{key:w,className:`wpill ${isPangram(w,allLetters)?"wpill-p":"wpill-n"}`},w))
      ),
      showWords&&found.length===0&&e("p",{style:{color:"var(--text-secondary)",fontSize:13,margin:"8px 0 0",fontStyle:"italic"}},"No words found yet!")
    ),
    // Bottom
    e("div",{style:{width:"100%",maxWidth:400,display:"flex",justifyContent:"space-between",alignItems:"center",padding:"0 4px"}},
      e("div",{style:{fontSize:12,color:"var(--text-secondary)",transition:"color 0.3s"}},`${foundPangrams} / ${puzzle.pangrams.length} pangram${puzzle.pangrams.length!==1?"s":""} found`),
      e("div",{style:{display:"flex",gap:8,alignItems:"center"}},
        prevGame&&e("button",{className:"nbtn",onClick:undoNewGame,style:{borderColor:"var(--msg-success-text)",color:"var(--msg-success-text)"}},"↩ Undo"),
        e("button",{className:"nbtn",onClick:startNewGame},"✦ New Puzzle")
      )
    ),
    e("p",{style:{fontSize:11,color:"var(--text-muted)",marginTop:28,textAlign:"center",letterSpacing:0.5,transition:"color 0.3s"}},"Type letters · Enter to submit · Space to shuffle")
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
